version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      next-ecosystem:
        patterns: ["next", "react", "react-dom", "@next/*"]
      supabase:
        patterns: ["@supabase/*"]
      sentry:
        patterns: ["@sentry/*"]
      vercel:
        patterns: ["@vercel/*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
